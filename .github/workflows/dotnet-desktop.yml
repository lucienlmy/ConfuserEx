# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will build, test, sign and package a WPF or Windows Forms desktop application
# built on .NET Core.
# To learn how to migrate your existing application to .NET Core,
# refer to https://docs.microsoft.com/en-us/dotnet/desktop-wpf/migration/convert-project-from-net-framework
#
# To configure this workflow:
#
# 1. Configure environment variables
# GitHub sets default environment variables for every workflow run.
# Replace the variables relative to your project in the "env" section below.
#
# For more information on GitHub Actions, refer to https://github.com/features/actions
# For a complete CI/CD sample to get started with GitHub Action workflows for Desktop Applications,
# refer to https://github.com/microsoft/github-actions-for-desktop-apps

name: Build .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Release]

    # For a list of available runner types, refer to
    # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on
    runs-on: windows-2025-vs2026
    env: 
      Configuration: Release
      SolutionPath: Confuser2.slnx
        
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.nuget/packages
#          !~/.nuget/packages/unwanted_package # Optional: Exclude specific packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x

    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v3
      
    # Restore the application to populate the obj folder with RuntimeIdentifiers
    - name: Restore the application
      run: msbuild ${{ env.SolutionPath }} /t:Restore /p:Configuration=${{ env.Configuration }} /p:Platform=x64 /v:m /bl:artifacts/logs/restore.binlog
      env:
        Configuration: Release

    - name: Build
      run: msbuild ${{ env.SolutionPath }} /p:Configuration=${{ env.Configuration }} /p:Platform=x64 /v:m /bl:artifacts/logs/build.binlog

    - name: Setup VSTest
      uses: Malcolmnixon/Setup-VSTest@v4

    - name: Run tests via vstest.console .NET FW Part 1
      run: |
        vstest.console "artifacts/bin/*/release/*Test.exe" /Framework:.NETFramework,Version=v4.7.2

    - name: Run tests via vstest.console .NET FW - Part 2
      run: |
        vstest.console "artifacts/bin/*/release_net472/*Test.exe" /Framework:.NETFramework,Version=v4.7.2

    - name: Run tests via vstest.console .NET
      run: |
        vstest.console "artifacts/bin/*/release_net8.0/*Test.dll" /Framework:.NETCoreApp,Version=v8.0

    - name: Run tests via vstest.console .NET - Part 2
      run: |
        vstest.console "artifacts/bin/*/release/*Tests.dll" /Framework:.NETCoreApp,Version=v8.0

    - name: Upload CLI .NET Framework build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ConfuserEx.CLI_fw
        path: |
          artifacts\bin\Confuser.CLI\${{ env.Configuration }}_net472
          !artifacts\bin\Confuser.CLI\${{ env.Configuration }}_net472\*.pdb
          !artifacts\bin\Confuser.CLI\${{ env.Configuration }}_net472\*.xml

    - name: Upload CLI .NET build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ConfuserEx.CLI_net
        path: |
          artifacts\bin\Confuser.CLI\${{ env.Configuration }}_net10.0
          !artifacts\bin\Confuser.CLI\${{ env.Configuration }}_net10.0\*.pdb
          !artifacts\bin\Confuser.CLI\${{ env.Configuration }}_net10.0\*.xml
        
    - name: Upload UI FW build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ConfuserEx_fw
        path: |
          artifacts\bin\ConfuserEx\${{ env.Configuration }}_net472
          !artifacts\bin\ConfuserEx\${{ env.Configuration }}_net472\*.pdb
          !artifacts\bin\ConfuserEx\${{ env.Configuration }}_net472\*.
        
    - name: Upload UI .NET build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ConfuserEx_net
        path: |
          artifacts\bin\ConfuserEx\${{ env.Configuration }}_net10.0-windows
          !artifacts\bin\ConfuserEx\${{ env.Configuration }}_net10.0-windows\*.pdb
          !artifacts\bin\ConfuserEx\${{ env.Configuration }}_net10.0-windows\*.xml
        
    - name: Upload Build log artifacts
      uses: actions/upload-artifact@v6
      with:
        name: logs
        path: |
          artifacts\logs\*.binlog

    - name: push to NuGet
      # Only push to NuGet if we're building a tag (optional)
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      # Loop through all the packages in the output folder and push them to
      # nuget.org, using the NUGET_API_KEY generated by the previous login step
      run: |
        Get-ChildItem artifacts\package\${{ env.Configuration }} -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName `
            --api-key "${{ secrets.MYGET_CI_API_KEY }}" `
            --source https://www.myget.org/F/obfuscation/api/v3/index.json
        }
  
